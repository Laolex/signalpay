<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b0ff"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c12"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="60" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e8f0"/>
      <stop offset="60%" stop-color="#e0e8f0"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark (48x48, centered vertically in 64px) -->
  <rect x="0" y="8" width="48" height="48" rx="10" fill="url(#bgGrad)"/>
  <rect x="0" y="8" width="48" height="48" rx="10" fill="none" stroke="url(#iconGrad)" stroke-width="1.2" opacity="0.5"/>

  <!-- Circuit corner marks on icon -->
  <line x1="3" y1="17" x2="3" y2="11" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="3" y1="11" x2="9" y2="11" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="47" x2="45" y2="53" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="53" x2="39" y2="53" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- S letterform -->
  <text x="24" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" fill="url(#iconGrad)" filter="url(#glow)">S</text>

  <!-- Signal pulse dots -->
  <circle cx="37" cy="38" r="1.5" fill="#00e5ff" opacity="0.8"/>
  <circle cx="41" cy="34" r="1.2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="44" cy="30" r="0.8" fill="#00e5ff" opacity="0.3"/>

  <!-- Wordmark: SIGNAL -->
  <text x="60" y="34" font-family="'IBM Plex Mono', 'Courier New', monospace" font-weight="700" font-size="20" letter-spacing="2" fill="#e0e8f0">SIGNAL</text>
  <!-- Wordmark: PAY in cyan -->
  <text x="155" y="34" font-family="'IBM Plex Mono', 'Courier New', monospace" font-weight="700" font-size="20" letter-spacing="2" fill="#00e5ff" filter="url(#glow)">PAY</text>

  <!-- Tagline -->
  <text x="60" y="50" font-family="'IBM Plex Mono', 'Courier New', monospace" font-weight="400" font-size="8" letter-spacing="2.5" fill="#3a5060">AI AGENT ALPHA MARKETPLACE</text>

  <!-- Separator line -->
  <line x1="60" y1="38" x2="305" y2="38" stroke="#1a2332" stroke-width="0.5"/>
</svg>
