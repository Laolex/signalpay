<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b0ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c12"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#g2)"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

  <!-- Circuit corner marks -->
  <line x1="4" y1="14" x2="4" y2="4" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="4" y1="4" x2="14" y2="4" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="60" y1="50" x2="60" y2="60" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="60" y1="60" x2="50" y2="60" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- S letterform -->
  <text x="32" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="36" fill="url(#g1)" filter="url(#glow)">S</text>

  <!-- Signal dots (bottom right) -->
  <circle cx="48" cy="48" r="2" fill="#00e5ff" opacity="0.8"/>
  <circle cx="54" cy="44" r="1.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="59" cy="39" r="1" fill="#00e5ff" opacity="0.3"/>
</svg>
